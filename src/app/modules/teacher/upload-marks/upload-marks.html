<div class="dashboard">

  <div class="page-header">
    <h1>Upload Marks</h1>
    <p>Enter and submit student marks</p>
  </div>

  <div class="form-card">
    <div class="form-card-title">Exam Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Class</label>
        <select class="form-input">
          <option>10-A</option>
          <option>10-B</option>
          <option>11-A</option>
          <option>12-B</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <select class="form-input">
          <option>Mathematics</option>
          <option>Physics</option>
          <option>Chemistry</option>
          <option>English</option>
        </select>
      </div>
      <div class="form-group">
        <label>Exam Type</label>
        <select class="form-input">
          <option>Mid-Term</option>
          <option>Final</option>
          <option>Internal</option>
        </select>
      </div>
      <div class="form-group">
        <label>Max Marks</label>
        <input type="number" class="form-input" value="100">
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">Student Marks Entry — Class 10-A</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>ROLL NO</th>
          <th>STUDENT NAME</th>
          <th>MARKS OBTAINED</th>
          <th>GRADE</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>001</td>
          <td>Aanya Sharma</td>
          <td><input type="number" class="marks-input" value="87"></td>
          <td><span class="pill blue">A</span></td>
          <td><span class="pill green">Pass</span></td>
        </tr>
        <tr>
          <td>002</td>
          <td>Rahul Verma</td>
          <td><input type="number" class="marks-input" value="74"></td>
          <td><span class="pill blue">B+</span></td>
          <td><span class="pill green">Pass</span></td>
        </tr>
        <tr>
          <td>003</td>
          <td>Priya Nair</td>
          <td><input type="number" class="marks-input" value="92"></td>
          <td><span class="pill green">A+</span></td>
          <td><span class="pill green">Pass</span></td>
        </tr>
        <tr>
          <td>004</td>
          <td>Kiran Patel</td>
          <td><input type="number" class="marks-input" value="45"></td>
          <td><span class="pill red">F</span></td>
          <td><span class="pill red">Fail</span></td>
        </tr>
        <tr>
          <td>005</td>
          <td>Sneha Iyer</td>
          <td><input type="number" class="marks-input" value="66"></td>
          <td><span class="pill yellow">C+</span></td>
          <td><span class="pill green">Pass</span></td>
        </tr>
        <tr>
          <td>006</td>
          <td>Arjun Mehta</td>
          <td><input type="number" class="marks-input" value="78"></td>
          <td><span class="pill blue">B+</span></td>
          <td><span class="pill green">Pass</span></td>
        </tr>
      </tbody>
    </table>
    <div class="table-footer">
      <button class="btn-save">Save & Submit Marks</button>
    </div>
  </div>

</div>
